<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NEON Student Nexus v4 – CRUD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="#">SMIT STUDENT MANAGEMENT SYSTEM</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Detail</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Logs & FAQS</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container main-container mt-5 pt-5">
    <h1 class="neon-title text-center mb-5">STUDENT MANAGEMENT SYSTEM</h1>

    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-9">
            <div class="futuristic-card p-4 p-md-5 mb-5" id="formCard">
                <form id="studentForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold">NAME</label>
                        <input type="text" class="form-control form-control-lg" id="name" required placeholder="Enter Student Name" />
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">AGE (18+)</label>
                        <input type="number" class="form-control form-control-lg" id="age" required min="1" placeholder="Enter Student Age" />
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">MARKS OBT. (1–100)</label>
                        <input type="number" class="form-control form-control-lg" id="marks" required min="0" max="100" placeholder="Enter Marks Obtained" />
                    </div>

                    <button type="submit" class="btn btn-neon btn-lg w-100 mt-2" id="submitBtn">ADD STUDENT</button>
                    <button type="button" class="btn btn-outline-light btn-lg w-100 mt-2 d-none" id="updateBtn">UPDATE ENTITY</button>
                    <input type="hidden" id="editIndex" value="-1">
                </form>

                <div id="error" class="error-message mt-4 text-center"></div>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12">
            <div class="futuristic-card overflow-hidden" id="tableCard">
                <div class="p-4 border-bottom border-cyan">
                    <h5 class="mb-0 fw-bold" style="color:var(--neon-cyan)">STUDENTS LIST</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="studentTable">
                        <thead>
                            <tr>
                                <th>STUDENT NAME</th>
                                <th>AGE</th>
                                <th>MARKS OBT.</th>
                                <th>STATUS</th>
                                <th>CONTROL</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-white">
            <div class="modal-header">
                <h5 class="modal-title" id="editModalLabel">MODIFY DETAILS</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <div class="mb-3">
                        <label class="form-label">NAME</label>
                        <input type="text" class="form-control" id="editName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">AGE</label>
                        <input type="number" class="form-control" id="editAge" required min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">MARKS OBT.</label>
                        <input type="number" class="form-control" id="editMarks" required min="0" max="100">
                    </div>
                    <input type="hidden" id="editModalIndex">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">CANCEL</button>
                <button type="button" class="btn btn-neon" id="saveEditBtn">SAVE CHANGES</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
